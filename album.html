<section class="card">
    <div class="gallery" id="gallery"></div>
</section>

<script src="data.js"></script>
<script>
const gallery = document.getElementById("gallery");

projects.forEach(p => {
    const img = document.createElement("img");
    img.src = p.image;
    img.title = p.title;
    gallery.appendChild(img);
});
</script>
