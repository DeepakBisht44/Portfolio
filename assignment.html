<section class="card">
    <ul class="assignments" id="assignList"></ul>
</section>

<script>
const username = "deepakbisht44";
const repo = "Portfolio";

fetch(`https://api.github.com/repos/${username}/${repo}/contents/assignments`)
.then(res => res.json())
.then(data => {
    const list = document.getElementById("assignList");

    data.forEach(file => {
        if(file.type === "file"){
            const li = document.createElement("li");
            li.innerHTML = `<a href="${file.download_url}" target="_blank">${file.name}</a>`;
            list.appendChild(li);
        }
    });
});
</script>
